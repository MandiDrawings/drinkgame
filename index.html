<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperial Transmission</title>
<style>
  body { 
    margin: 0; 
    background: #000; 
    color: #ffe81f; 
    font-family: 'Courier New', sans-serif; 
    overflow: hidden; 
  }
  
  /* Planète en arrière-plan */
  #planet {
    position: absolute; 
    right: -10vw; 
    top: 10vh; 
    width: 40vw; 
    height: 40vw;
    background: radial-gradient(circle at 30% 30%, #4488ff, #001133);
    border-radius: 50%; 
    box-shadow: inset -20px -20px 50px #000; 
    z-index: 0;
  }

  /* HUD fixe */
  .hud { 
    position: fixed; 
    top: 0; 
    width: 100%; 
    border-bottom: 1px solid #333; 
    padding: 10px; 
    background: rgba(0,20,0,0.8); 
    font-size: 14px; 
    color: #00ff41; 
    z-index: 10; 
    text-align: center; 
    text-transform: uppercase;
  }

  /* Texte progressif */
  .content { 
    position: relative; 
    z-index: 5; 
    margin-top: 120px; 
    padding: 50px; 
    font-size: 2.5vw; 
    line-height: 1.6; 
  }
  
  .line { 
    opacity: 0; 
    transform: translateY(20px); 
    transition: all 1s ease; 
  }
  
  .visible { 
    opacity: 1; 
    transform: translateY(0); 
  }
  
  .code { 
    color: #00ff41; 
    font-weight: bold; 
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="hud">NODE STATUS: ACTIVE // CONNECTION: SECURE // DECRYPTION INITIATED</div>
<div id="planet"></div>

<div class="content">
  <div class="line">A LONG TIME AGO IN A GALAXY FAR, FAR AWAY...</div><br>
  <div class="line">THE SACRED LEMON HAS BEEN INTERCEPTED BY AN IMPERIAL FACTION.</div><br><br>
  <div class="line">ALL NAVIGATION RECORDS HAVE BEEN ERASED.</div>
  <div class="line code">ACCESS CODE: CITRON-OVERRIDE</div>
</div>

<script>
  // Apparition progressive des lignes
  const lines = document.querySelectorAll('.line');
  lines.forEach((line, i) => {
    setTimeout(() => line.classList.add('visible'), i * 2000);
  });
</script>

</body>
</html>
