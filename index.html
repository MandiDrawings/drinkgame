<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperial Transmission</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* 🌌 étoiles */
canvas {
  position: fixed;
  inset: 0;
  background: black;
}

/* 🎬 zone Star Wars */
.crawl-container {
  position: fixed;
  inset: 0;
  perspective: 420px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  overflow: hidden;
}

/* 🎬 CRAWL STAR WARS RÉEL */
.crawl {
  position: absolute;

  width: 85vw;
  max-width: 650px;

  bottom: -160%;

  transform-origin: 50% 100%;
  transform: rotateX(45deg);

  font-size: 6vw;
  font-weight: 900;
  letter-spacing: 1.6px;
  line-height: 2;

  text-transform: uppercase;
  text-align: justify;

  color: #ffe81f;

  text-shadow:
    0 0 10px rgba(255,232,31,0.6),
    0 0 20px rgba(255,232,31,0.3);

  animation: crawl 70s linear forwards;
}

/* 🎬 IMPORTANT : arrivée progressive (Star Wars réel) */
@keyframes crawl {
  0% {
    transform: rotateX(45deg) translateY(100%);
  }

  100% {
    transform: rotateX(45deg) translateY(-320%);
  }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="crawl-container">
  <div class="crawl" id="text">

A LONG TIME AGO IN A GALAXY FAR, FAR AWAY...

IMPERIAL TRANSMISSION DETECTED.

THE SACRED LEMON HAS BEEN INTERCEPTED.

THIS SIGNAL IS NOT AUTHORIZED.

THE EMPIRE IS LISTENING.

ACCESS CODE: CITRON-OVERRIDE

  </div>
</div>

<script>

/* 🌌 STARFIELD */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const stars = [];

for(let i=0;i<240;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height
  });
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";

  for(let s of stars){
    s.y += 0.5;
    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
    ctx.fillRect(s.x, s.y, 2, 2);
  }

  requestAnimationFrame(draw);
}

draw();

/* 🎧 VOIX R2-D2 SIMULÉE */
function r2d2(){
  const ctxA = new (window.AudioContext || window.webkitAudioContext)();

  function beep(freq, time){
    const osc = ctxA.createOscillator();
    const gain = ctxA.createGain();

    osc.type = "square";
    osc.frequency.value = freq;

    gain.gain.value = 0.05;

    osc.connect(gain);
    gain.connect(ctxA.destination);

    osc.start();
    osc.stop(ctxA.currentTime + time);
  }

  setTimeout(()=>beep(600,0.1), 2000);
  setTimeout(()=>beep(900,0.1), 2200);
  setTimeout(()=>beep(400,0.15), 2500);
  setTimeout(()=>beep(750,0.1), 2800);
}

/* 📡 activation audio */
document.addEventListener("click", ()=>{
  r2d2();
}, {once:true});

</script>

</body>
</html>
