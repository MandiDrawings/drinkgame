<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transmission</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* 🌌 étoiles */
canvas {
  position: fixed;
  inset: 0;
  background: black;
}

/* 🎬 perspective Star Wars (retour base) */
.crawl-container {
  position: fixed;
  inset: 0;
  perspective: 350px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  overflow: hidden;
}

/* 🎬 CRAWL SIMPLE (VERSION DE BASE PROPRE) */
.crawl {
  position: absolute;

  width: 88vw;
  max-width: 640px;

  bottom: -140%;

  transform-origin: 50% 100%;
  transform: rotateX(45deg);

  font-size: 6vw;
  font-weight: 900;
  letter-spacing: 1.6px;
  line-height: 2;

  text-transform: uppercase;
  text-align: justify;

  color: #ffe81f;

  text-shadow:
    0 0 10px rgba(255,232,31,0.6),
    0 0 20px rgba(255,232,31,0.25);

  animation: crawl 65s linear forwards;
}

/* 🎬 mouvement simple (comme au début) */
@keyframes crawl {
  0% {
    transform: rotateX(45deg) translateY(30%);
  }

  100% {
    transform: rotateX(45deg) translateY(-320%);
  }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="crawl-container">
  <div class="crawl">

A LONG TIME AGO IN A GALAXY FAR, FAR AWAY...

THIS IS AN ACTIVE IMPERIAL TRANSMISSION.

THE SACRED LEMON HAS BEEN INTERCEPTED.

ALL NAVIGATION RECORDS HAVE BEEN ERASED.

THE EMPIRE IS LISTENING.

ACCESS CODE: CITRON-OVERRIDE

  </div>
</div>

<script>

/* 🌌 STARFIELD SIMPLE (RETRO DU DÉBUT) */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const stars = [];

for(let i=0;i<260;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height
  });
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";

  for(let s of stars){
    s.y += 0.5;

    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }

    ctx.fillRect(s.x, s.y, 2, 2);
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
