<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperial Transmission - Compromised</title>

<style>
body {
  margin: 0;
  background: #050505;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
  touch-action: manipulation;
  color: #ffe81f;
}

/* 📺 EFFET SCANLINE & CRT */
body::before {
  content: " ";
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 4px, 3px 100%;
  pointer-events: none;
  z-index: 10;
}

/* HUD DÉCORATIF */
.hud {
  position: fixed;
  top: 0; left: 0; width: 100%; padding: 15px;
  font-size: 12px; color: #00ff41; z-index: 5;
  display: flex; justify-content: space-between;
}

/* 🌌 STARFIELD */
#stars { position: fixed; inset: 0; z-index: -1; }

/* 🎬 CRAWL */
.crawl-container {
  position: relative; height: 100vh; perspective: 280px;
  display: flex; justify-content: center;
}

.crawl {
  position: absolute; bottom: -220%; width: 100%;
  transform-origin: 50% 100%; transform: rotateX(38deg);
  animation: crawl 65s linear forwards;
  font-size: 7vw; font-weight: 900;
  text-transform: uppercase; padding: 0 6vw;
  line-height: 1.5; text-align: justify;
  text-shadow: 0 0 10px #ff0000;
}

/* 👾 ANIMATIONS GLITCH */
.glitch { animation: glitch 0.2s infinite; }
@keyframes glitch {
  0% { transform: skew(0deg); opacity: 1; }
  25% { transform: skew(-2deg); opacity: 0.9; }
  50% { transform: skew(2deg); opacity: 1; }
  75% { transform: skew(-1deg); opacity: 0.95; }
}

@keyframes crawl {
  0% { transform: rotateX(38deg) translateY(120%); }
  100% { transform: rotateX(38deg) translateY(-280%); }
}

.flash { animation: flash 0.4s ease; }
@keyframes flash {
  50% { background: rgba(255,0,0,0.2); }
}
</style>
</head>
<body>

<div class="hud">
  <div>ID_NODE: 77-B / STATUS: CORRUPTED</div>
  <div>SIGNAL: DECRYPTING... [###--]</div>
</div>

<canvas id="stars"></canvas>

<div class="crawl-container">
  <div class="crawl glitch">
    ALERT: SACRED LEMON INTERCEPTED.<br><br>
    IMPERIAL RELAY NODE COMPROMISED.<br><br>
    DO NOT TRUST THE TRANSMISSION.<br><br>
    ACCESS CODE: CITRON-OVERRIDE
  </div>
</div>

<script>
// --- Starfield ---
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let w, h;
function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener("resize", resize); resize();

const stars = Array.from({length: 200}, () => ({x: Math.random()*w, y: Math.random()*h, z: Math.random()*w}));
function draw(){
  ctx.fillStyle = "black"; ctx.fillRect(0,0,w,h);
  for(let s of stars){
    s.z -= 2;
    if(s.z <= 0){ s.x = Math.random()*w; s.y = Math.random()*h; s.z = w; }
    const k = 100/s.z;
    ctx.fillStyle = "white";
    ctx.fillRect((s.x-w/2)*k+w/2, (s.y-h/2)*k+h/2, 1, 1);
  }
  requestAnimationFrame(draw);
}
draw();

// --- Audio & Voix ---
let audioCtx;
function initAudio(){ if(!audioCtx) audioCtx = new AudioContext(); audioCtx.resume(); }

function voice(text, pitch=0.2){
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-GB"; msg.pitch = pitch; msg.rate = 0.6;
  speechSynthesis.speak(msg);
}

document.addEventListener("click", () => {
  initAudio();
  document.body.classList.add("flash");
  voice("Imperial node compromised. Access code Citron Override.", 0.1);
  setTimeout(()=>document.body.classList.remove("flash"), 1000);
}, {once: true});
</script>
</body>
</html>
